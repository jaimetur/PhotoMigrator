name: 🐳 Build and Push Docker Image

on:
  # ──────────────── 1) Disparador manual desde GitHub Actions ────────────────
  workflow_dispatch:      # Allows manual execution of the workflow
    inputs:
      create_release:
        description: "Create Release ?"
        type: boolean
        required: false
        default: false
      final_release:
        description: "Is this a Final Release?"
        required: false
        default: false
        type: boolean

  # ──────────────── 2) Disparador  desde otro workflow ────────────────
  workflow_call:          # Allow to call this workflow from another workflow
    inputs:
      final_release:
        description: "Is this a Final Release?"
        required: false
        default: false
        type: boolean
    secrets:
      TOKEN_GITHUB:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

  # ──────────────── 3) Disparador automático por push ──────────────────────
  push:                   # Ejecución tras push en cualquier rama, excepto en los path-ignore
    branches:
      - main             # Ejecución tras push en main, excepto en los path-ignore
      # - development      # Ejecución tras push en developer, excepto en los path-ignore
    paths-ignore:
      - .gitignore
      - .idea/**
      - gpth*/**
      - README.md

  # ──────────────── 4) Disparador automático por cron ──────────────────────
  #  schedule:
  #    - cron: '0 2 * * *' # Ejecución diaria a las 2 AM UTC
  # ─────────────────────────────────────────────────────────────────────────

jobs:
  build:
    strategy:
      matrix:
#        os: [ubuntu-latest, windows-latest]  # os list
        os: [ubuntu-latest]  # os list
        python-version: [ "3.12.10" ]

    runs-on: ${{ matrix.os }}

    steps:
      # 🧾 Checkout Repository
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v7
        with:
          token: ${{ inputs.token_github || secrets.TOKEN_GITHUB }}

      # 🐍 Set up Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # 📦 Install dependencies
      - name: 📦 Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          

      # ▶️ Execute tools/BuildBinary.py with --no-compile to avoid compile any binary
      - name: ▶️ Execute tools/BuildBinary.py with --no-compile to avoid compile any binary
        shell: bash
        run: |
          echo "::group::Execute for ${{ matrix.os }}"
          python3 tools/BuildBinary.py --no-compile
          echo "::endgroup::"
          

      # 🏷️ Extract TOOL_VERSION and ARCHIVE_PATH from build_info.txt
      - name: 🏷️ Extract TOOL_VERSION and ARCHIVE_PATH from build_info.txt
        shell: bash
        run: |
          # Read TOOL_VERSION from the first line
          TOOL_VERSION=$(grep '^TOOL_VERSION=' build_info.txt | cut -d'=' -f2-)

          # Read ARCHIVE_PATH from the second line
          ARCHIVE_PATH=$(grep '^ARCHIVE_PATH=' build_info.txt | cut -d'=' -f2-)

          # Save both variables on GitHub Actions environment
          echo "TOOL_VERSION=${TOOL_VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=${ARCHIVE_PATH}" >> $GITHUB_ENV

          # Print both variables on screen
          echo "TOOL_VERSION (Linux/macOS): ${TOOL_VERSION}"
          echo "ARCHIVE_PATH (Linux/macOS)  : ${ARCHIVE_PATH}"


      # ===========================
      # Generate the Docker version
      # ===========================
      # 🐳 Log in to Docker Hub
      - name: 🐳 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 🐳 Build & Push Docker image (Web Interface)
      - name: 🐳 Build & Push Docker image (Web Interface)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          IMAGE_NAME="jaimetur/photomigrator"

          # Define FINAL_RELEASE=false con fallback si está vacío (por ejemplo, en eventos push)
          FINAL_RELEASE="${{ inputs.final_release }}"
          FINAL_RELEASE=${FINAL_RELEASE:-false}
      
          echo "→ FINAL_RELEASE = $FINAL_RELEASE"
          echo "→ IMAGE_NAME    = $IMAGE_NAME"
          
          docker build --pull --no-cache \
                -t ${IMAGE_NAME}:${TOOL_VERSION} \
                -f docker-web/dockerfile .
          
          # Push etiqueta de release/version
          docker push ${IMAGE_NAME}:${TOOL_VERSION}
          
          # Push 'latest' siempre
          docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:latest
      
          # Push 'latest-stable' solo para release final estable
          if [[ "${FINAL_RELEASE}" == "true" && "${TOOL_VERSION}" != *alpha* && "${TOOL_VERSION}" != *beta* && "${TOOL_VERSION}" != *RC* ]]; then
            docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest-stable
            docker push ${IMAGE_NAME}:latest-stable
          fi

      # 🐳 Build & Push Docker image (CLI Linux)
      - name: 🐳 Build & Push Docker image (CLI Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          IMAGE_NAME="jaimetur/photomigrator-linux"

          FINAL_RELEASE="${{ inputs.final_release }}"
          FINAL_RELEASE=${FINAL_RELEASE:-false}

          echo "→ FINAL_RELEASE = $FINAL_RELEASE"
          echo "→ IMAGE_NAME    = $IMAGE_NAME"

          docker build --pull --no-cache \
                -t ${IMAGE_NAME}:${TOOL_VERSION} \
                -f docker-cli/dockerfile-linux .

          docker push ${IMAGE_NAME}:${TOOL_VERSION}

          docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:latest

          if [[ "${FINAL_RELEASE}" == "true" && "${TOOL_VERSION}" != *alpha* && "${TOOL_VERSION}" != *beta* && "${TOOL_VERSION}" != *RC* ]]; then
            docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest-stable
            docker push ${IMAGE_NAME}:latest-stable
          fi
          

      # 🐳 Build & Push Windows Docker image (disabled since this doesn't work as expected)
      - name: 🐳 Build & Push Windows Docker image (disabled since this doesn't work as expected)
        if: ${{ startsWith(matrix.os, 'windows') }}
        shell: bash
        run: |
          # Define FINAL_RELEASE=false con fallback si está vacío (por ejemplo, en eventos push)
          FINAL_RELEASE="${{ inputs.final_release }}"
          FINAL_RELEASE=${FINAL_RELEASE:-false}
      
          echo "→ FINAL_RELEASE = $FINAL_RELEASE"
          
          IMAGE_NAME="jaimetur/photomigrator-windows"

          # Construir imagen Windows
          docker build --pull --no-cache \
                -t ${IMAGE_NAME}:${TOOL_VERSION} \
                -f docker-cli/dockerfile-windows .
          
          # Push siempre etiqueta obligatoria con la versión
          docker push ${IMAGE_NAME}:${TOOL_VERSION}
          
          # Push 'latest' if final_release is false OR it's alpha/beta/RC
          if [[ "${FINAL_RELEASE}" == "false" || "${TOOL_VERSION}" == *alpha* || "${TOOL_VERSION}" == *beta* || "${TOOL_VERSION}" == *RC* ]]; then
            docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest
            docker push ${IMAGE_NAME}:latest
          fi
      
          # Push 'latest-stable' only if final_release is true AND not alpha/beta/RC
          if [[ "${FINAL_RELEASE}" == "true" && "${TOOL_VERSION}" != *alpha* && "${TOOL_VERSION}" != *beta* && "${TOOL_VERSION}" != *RC* ]]; then
            docker tag ${IMAGE_NAME}:${TOOL_VERSION} ${IMAGE_NAME}:latest-stable
            docker push ${IMAGE_NAME}:latest-stable
          fi

      # 🧩 Prepare ZIP docker package
      - name: 🧩 Prepare ZIP docker package
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          mkdir -p PhotoMigrator/docker-cli
          mkdir -p PhotoMigrator/docker-cli/docs
          mkdir -p PhotoMigrator/docker-web
          mkdir -p PhotoMigrator/docker-web/docs
          cp docker-cli/PhotoMigrator.sh PhotoMigrator/docker-cli/
          cp docker-cli/PhotoMigrator.bat PhotoMigrator/docker-cli/
          cp docker-cli/EXECUTION-INSTRUCTIONS.txt PhotoMigrator/docker-cli/
          cp docker-cli/docker.conf PhotoMigrator/docker-cli/
          cp Config.ini PhotoMigrator/docker-cli/
          cp -r help PhotoMigrator/docker-cli/
          cp README.md PhotoMigrator/docker-cli/docs/README.md
          cp CHANGELOG.md PhotoMigrator/docker-cli/docs/CHANGELOG.md
          cp ROADMAP.md PhotoMigrator/docker-cli/docs/ROADMAP.md
          cp DOWNLOAD.md PhotoMigrator/docker-cli/docs/DOWNLOAD.md
          cp CONTRIBUTING.md PhotoMigrator/docker-cli/docs/CONTRIBUTING.md
          cp CODE_OF_CONDUCT.md PhotoMigrator/docker-cli/docs/CODE_OF_CONDUCT.md
          cp LICENSE PhotoMigrator/docker-cli/docs/LICENSE
          cp docker-web/docker-compose.yml PhotoMigrator/docker-web/
          cp docker-web/EXECUTION-INSTRUCTIONS.txt PhotoMigrator/docker-web/
          cp docker-web/.env PhotoMigrator/docker-web/
          cp -r help PhotoMigrator/docker-web/
          cp README.md PhotoMigrator/docker-web/docs/README.md
          cp CHANGELOG.md PhotoMigrator/docker-web/docs/CHANGELOG.md
          cp ROADMAP.md PhotoMigrator/docker-web/docs/ROADMAP.md
          cp DOWNLOAD.md PhotoMigrator/docker-web/docs/DOWNLOAD.md
          cp CONTRIBUTING.md PhotoMigrator/docker-web/docs/CONTRIBUTING.md
          cp CODE_OF_CONDUCT.md PhotoMigrator/docker-web/docs/CODE_OF_CONDUCT.md
          cp LICENSE PhotoMigrator/docker-web/docs/LICENSE
          zip -r PhotoMigrator_v${{ env.TOOL_VERSION }}_docker.zip PhotoMigrator

      # 📤 Upload Docker ZIP as artifact to be used in the main workflow
      - name: 📤 Upload Docker ZIP as artifact to be used in the main workflow
        uses: actions/upload-artifact@v7
        with:
          name: PhotoMigrator_v${{ env.TOOL_VERSION }}_docker.zip
          path: PhotoMigrator_v${{ env.TOOL_VERSION }}_docker.zip

      # ================================
      # End of Docker version Generation
      # ================================

      # 🏷️ Create Release and Upload Artifact to it (only if this action have been launched manually with create_release=true)
      - name: 🏷️ Create Release and Upload Artifact to it (only if this action have been launched manually with create_release=true)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TOOL_VERSION }}
          name: v${{ env.TOOL_VERSION }}
          draft: false
          generate_release_notes: true
          body_path: RELEASE-NOTES.md
          files: |
            PhotoMigrator_v${{ env.TOOL_VERSION }}_docker.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}
