services:
  photomigrator-dev:
    build:
      context: ${APP_DIR}
      dockerfile: docker/dockerfile
    container_name: photomigrator-dev
    ports:
      - "${PORT_DEV}:6078"
    env_file:
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PHOTOMIGRATOR_WEB_DELETE_ROOTS=${PHOTOMIGRATOR_WEB_DELETE_ROOTS}
      - PYTHONUNBUFFERED=1
    command: >
      sh -lc "
      if [ ! -x /app/exif_tool/exiftool ] && [ -f /app/exif_tool/others.zip ]; then
        unzip -o /app/exif_tool/others.zip -d /app/exif_tool >/dev/null &&
        chmod +x /app/exif_tool/exiftool || true;
      fi;
      uvicorn src.web_interface.app:app --host 0.0.0.0 --port 6078 --reload-dir /app/src
      "
    volumes:
      - ${APP_DIR}:/app
      - ${CONFIG_DIR}:/app/config
      - ${DATA_DIR}:/app/data
      - ${VOLUMES_DIR}:/app/volumes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6078/healthz', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
